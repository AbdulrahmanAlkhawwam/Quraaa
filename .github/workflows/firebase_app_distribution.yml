name: Firebase App Distribution (Android)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build artifact type (apk or aab)'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: ''

jobs:
  distribute:
    name: Build and distribute Android release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Keep this in sync with the project's Flutter SDK constraint.
          flutter-version: '3.44.2'
          cache: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is not set." >&2
            exit 1
          fi
          SERVICE_ACCOUNT_PATH="${RUNNER_TEMP}/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$SERVICE_ACCOUNT_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SERVICE_ACCOUNT_PATH" >> "$GITHUB_ENV"

      - name: Build release artifact
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          HOST: ${{ vars.HOST }}
          BASEURL: ${{ vars.BASEURL }}
          APP_ENV: production
          LATEST_VERSION: ${{ vars.LATEST_VERSION }}
        run: |
          if [ -z "$HOST" ] || [ -z "$BASEURL" ]; then
            echo "ERROR: HOST and BASEURL repository variables must be set." >&2
            exit 1
          fi

          dart_defines=(
            "--dart-define=HOST=$HOST"
            "--dart-define=BASEURL=$BASEURL"
            "--dart-define=APP_ENV=$APP_ENV"
          )
          [ -n "$LATEST_VERSION" ] && dart_defines+=("--dart-define=LATEST_VERSION=$LATEST_VERSION")

          if [ "$BUILD_TYPE" = "apk" ]; then
            flutter build apk --release "${dart_defines[@]}"
            echo "ARTIFACT=build/app/outputs/flutter-apk/app-release.apk" >> "$GITHUB_ENV"
          elif [ "$BUILD_TYPE" = "aab" ]; then
            flutter build appbundle --release "${dart_defines[@]}"
            echo "ARTIFACT=build/app/outputs/bundle/release/app-release.aab" >> "$GITHUB_ENV"
          else
            echo "ERROR: Invalid build type: $BUILD_TYPE" >&2
            exit 1
          fi

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          if [ -z "$FIREBASE_ANDROID_APP_ID" ]; then
            echo "ERROR: FIREBASE_ANDROID_APP_ID secret is not set." >&2
            exit 1
          fi
          if [ -z "$FIREBASE_TESTER_GROUPS" ]; then
            echo "ERROR: FIREBASE_TESTER_GROUPS secret is not set." >&2
            exit 1
          fi

          args=(
            appdistribution:distribute
            "$ARTIFACT"
            --app "$FIREBASE_ANDROID_APP_ID"
            --groups "$FIREBASE_TESTER_GROUPS"
          )
          [ -n "$FIREBASE_PROJECT_ID" ] && args+=(--project "$FIREBASE_PROJECT_ID")
          [ -n "$RELEASE_NOTES" ] && args+=(--release-notes "$RELEASE_NOTES")

          firebase "${args[@]}"
